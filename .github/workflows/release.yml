name: Release APK

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/upload-keystore.jks"

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ runner.temp }}/upload-keystore.jks
          EOF

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Get version from tag
        id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/baby-monitor-${{ steps.version.outputs.TAG }}.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/app/outputs/flutter-apk/baby-monitor-${{ steps.version.outputs.TAG }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Baby Monitor ${{ steps.version.outputs.TAG }}
          body: |
            ## Baby Monitor ${{ steps.version.outputs.TAG }}

            ### Install on Android
            1. Download **baby-monitor-${{ steps.version.outputs.TAG }}.apk** below
            2. Open the file on your Android phone
            3. If prompted, allow "Install from unknown sources" for your browser/file manager
            4. Tap **Install**

            ### Requirements
            - Android 6.0 (API 23) or higher
            - Samsung, Google Pixel, OnePlus, or any Android phone

            ### iOS
            iOS builds are not yet available. An Apple Developer account is required for TestFlight distribution.
          files: app/build/app/outputs/flutter-apk/baby-monitor-${{ steps.version.outputs.TAG }}.apk
          draft: false
          prerelease: false
          generate_release_notes: true
