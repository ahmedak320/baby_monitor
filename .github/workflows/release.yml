name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: subosito/flutter-action@1508160852fb97248640997f7cfb38da241df0ba # v2.9.1
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  build-android-mobile:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1508160852fb97248640997f7cfb38da241df0ba # v2.9.1
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/upload-keystore.jks"

      - name: Create key.properties
        run: |
          cat > android/key.properties <<'KEYS'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ runner.temp }}/upload-keystore.jks
          KEYS
          sed -i 's/^ *//' android/key.properties

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Get dependencies
        run: flutter pub get

      - name: Build release Mobile APK
        run: flutter build apk --release --flavor mobile --dart-define-from-file=.env

      - name: Get version from tag
        id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-mobile-release.apk \
             build/app/outputs/flutter-apk/baby-monitor-mobile-${{ steps.version.outputs.TAG }}.apk

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-android-mobile
          path: app/build/app/outputs/flutter-apk/baby-monitor-mobile-${{ steps.version.outputs.TAG }}.apk

  build-android-tv:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1508160852fb97248640997f7cfb38da241df0ba # v2.9.1
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/upload-keystore.jks"

      - name: Create key.properties
        run: |
          cat > android/key.properties <<'KEYS'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ runner.temp }}/upload-keystore.jks
          KEYS
          sed -i 's/^ *//' android/key.properties

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Get dependencies
        run: flutter pub get

      - name: Build release TV APK
        run: flutter build apk --release --flavor tv --dart-define-from-file=.env

      - name: Get version from tag
        id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-tv-release.apk \
             build/app/outputs/flutter-apk/baby-monitor-tv-${{ steps.version.outputs.TAG }}.apk

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-android-tv
          path: app/build/app/outputs/flutter-apk/baby-monitor-tv-${{ steps.version.outputs.TAG }}.apk

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android-mobile, build-android-tv]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get version from tag
        id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: Baby Monitor ${{ steps.version.outputs.TAG }}
          body: |
            ## Baby Monitor ${{ steps.version.outputs.TAG }}

            ### Android Phone / Tablet
            1. Download **baby-monitor-mobile-${{ steps.version.outputs.TAG }}.apk** below
            2. Open the file on your Android device
            3. If prompted, allow "Install from unknown sources"
            4. Tap **Install**

            **Requirements:** Android 6.0 (API 23) or higher

            ### Android TV / Fire TV
            1. Download **baby-monitor-tv-${{ steps.version.outputs.TAG }}.apk** below
            2. Sideload via ADB: `adb install baby-monitor-tv-${{ steps.version.outputs.TAG }}.apk`
            3. Or use a file manager app on your TV to install

            **Requirements:** Android TV 6.0+ or Amazon Fire TV (2nd gen+)
            **Supported:** Android TV, Google TV, Amazon Fire TV Stick, Fire TV Cube

            ### iOS
            iOS builds are not yet available. An Apple Developer account is required for TestFlight distribution.
          files: |
            release-artifacts/release-android-mobile/*
            release-artifacts/release-android-tv/*
          draft: false
          prerelease: false
          generate_release_notes: true
