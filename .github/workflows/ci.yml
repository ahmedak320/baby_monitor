name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  flutter-analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: subosito/flutter-action@1508160852fb97248640997f7cfb38da241df0ba # v2.9.1
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ test/

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  flutter-build-android-mobile:
    runs-on: ubuntu-latest
    needs: flutter-analyze-test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1508160852fb97248640997f7cfb38da241df0ba # v2.9.1
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Get dependencies
        run: flutter pub get

      - name: Build Mobile APK
        run: flutter build apk --debug --flavor mobile --dart-define-from-file=.env

      - name: Upload Mobile APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: debug-apk-mobile
          path: app/build/app/outputs/flutter-apk/app-mobile-debug.apk

  flutter-build-android-tv:
    runs-on: ubuntu-latest
    needs: flutter-analyze-test
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1508160852fb97248640997f7cfb38da241df0ba # v2.9.1
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Get dependencies
        run: flutter pub get

      - name: Build TV APK
        run: flutter build apk --debug --flavor tv --dart-define-from-file=.env

      - name: Upload TV APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: debug-apk-tv
          path: app/build/app/outputs/flutter-apk/app-tv-debug.apk

  python-worker-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  security-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: subosito/flutter-action@1508160852fb97248640997f7cfb38da241df0ba # v2.9.1
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Audit dependencies
        run: dart pub outdated --no-dev-dependencies
