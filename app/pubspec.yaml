name: baby_monitor
description: "Safe YouTube content filtering app for kids."
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.9.0

  # YouTube player
  youtube_player_iframe: ^5.0.0
  webview_flutter: ^4.13.1

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # HTTP
  dio: ^5.7.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2

  # Auth & Security
  local_auth: ^2.3.0
  crypto: ^3.0.6
  flutter_screen_lock: ^9.1.0

  # Payments
  purchases_flutter: ^8.3.0

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint:
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
